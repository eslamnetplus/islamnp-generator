<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>مولد تصاميم اسلام نت بلس</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <header class="header">
    <img src="assets/logo.png" class="logo">
    <h1>أنشئ إعلان شبكتك خلال ثوانٍ</h1>
    <p>أدخل بياناتك وسيتم إنشاء تصميم احترافي جاهز للتنزيل</p>
  </header>

  <section class="form-box">
    <input type="text" id="phoneInput" placeholder="أدخل رقم الهاتف">
    <input type="text" id="networkInput" placeholder="أدخل اسم الشبكة">

    <button onclick="updateDesign()">تحديث التصميم</button>
    <button onclick="downloadDesign()">تحميل التصميم</button>
  </section>

  <section class="preview-section">
    <div id="design" class="design-card">

      <div class="top-bar">
        <img src="assets/logo.png" class="small-logo">
        <div>
          <h2>اسلام نت بلس</h2>
          <p>كبينة الواي فاي</p>
        </div>
      </div>

      <div class="content-grid">

        <div class="left-side">
          <img src="assets/wifi-icon.jpg" class="wifi-icon">
          <h3>اشترك بسهولة</h3>
          <p>اختر شبكتك وابدأ خلال لحظات</p>

          <div class="info-card">
            <span>📶 الشبكة:</span>
            <strong id="networkText">اسم الشبكة</strong>
          </div>

          <div class="info-card">
            <span>📱 الهاتف:</span>
            <strong id="phoneText">777000000</strong>
          </div>

          <img src="assets/qr.png" class="qr">
        </div>

        <div class="right-side">
          <img src="assets/home-ui.jpg" class="phone-ui">
          <img src="assets/wifi-ui.jpg" class="wifi-ui">
        </div>

      </div>

    </div>
  </section>

</div>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<script src="script.js"></script>

</body>
</html>
